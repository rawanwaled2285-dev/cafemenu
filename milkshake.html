<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Shake</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<script src="cartFunctions.js"></script>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="menu.html">☕ NOIR CAFE</a>

        <a href="menu.html" class="btn btn-warning">
            ⬅ Back
        </a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="text-center mb-4">🥤 Milk Shake</h2>

    <div class="row" id="products"></div>

</div>

<script>
fetch("products.json")
.then(response => response.json())
.then(products => {

    let milkShakes = products.filter(product => product.category === "Mlik shake");

    let output = "";

    milkShakes.forEach(product => {

        output += `
        <div class="col-md-3 mb-4">

            <div class="card h-100 shadow">

                <img src="${product.image}" class="card-img-top" alt="${product.name}">

                <div class="card-body text-center">

                    <h5>${product.name}</h5>

                    <p class="fw-bold text-success">${product.price} EGP</h4>
                    <button
                    class="btn btn-warning w-100"
                    onclick="addToCart(${product.id})">

                    Add To Cart

                    </button>

 


            

                </div>

            </div>

        </div>
        `;

    });

    document.getElementById("products").innerHTML = output;

});
</script>
<script src="cartFunctions.js"></script>

</body>
</html>
