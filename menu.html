<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR Cafe Menu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="menu.html">
            ☕ NOIR CAFE
        </a>

        <a href="cart.html" class="btn btn-warning rounded-pill px-4">
            🛒 Cart
            <span id="cart-count">0</span>
        </a>

    </div>

</nav>

<!-- Categories -->

<div class="container mt-5">

    <div class="text-center">

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='hotdrinks.html'">
            ☕ Hot Drinks
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='colddrinks.html'">
            🥤 Cold Drinks
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='milkshake.html'">
            🥤 Milk Shake
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='freshjuice.html'">
            🧃 Fresh Juice
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='mojito.html'">
            🍹 Mojito
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='desserts.html'">
            🍰 Desserts
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='meals.html'">
            🍕 Meals
        </button>

        <button class="btn btn-dark m-2 rounded-pill px-4"
            onclick="location.href='appetizers.html'">
            🍟 Appetizers
        </button>

    </div>

</div>

<div class="container mt-5 text-center">

    <h2>Welcome to NOIR CAFE ☕</h2>

    <p>Select a category to view our menu.</p>

</div>

<script src="cartFunctions.js"></script>

</body>
</html>
